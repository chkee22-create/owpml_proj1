<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - Paper Mate AI</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/auth.css">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body class="auth-body">

<div class="auth-page">

  <a href="./index.html" class="auth-logo">
    <div class="logo-icon-sm"><i class="fa-solid fa-robot"></i></div>
    <div>
      <div class="auth-logo-sub">ChatBot AI</div>
      <div class="auth-logo-title">Paper Mate</div>
    </div>
  </a>

  <div class="auth-card">

    <button class="social-btn google-btn">
      <span class="social-icon google-icon">G</span> Gmail 연동
    </button>
    <button class="social-btn kakao-btn">
      <span class="social-icon kakao-icon">TALK</span> 카카오톡 연동
    </button>
    <button class="social-btn naver-btn">
      <span class="social-icon naver-icon">N</span> 네이버 연동
    </button>

    <div class="auth-divider"><span>또는</span></div>

    <input id="inputId" type="text"     class="auth-input" placeholder="아이디" />
    <input id="inputPw" type="password" class="auth-input" placeholder="비밀번호" />

    <div class="auth-submit-row">
      <button class="auth-submit-btn" onclick="handleLogin()">계속</button>
    </div>

    <p class="auth-switch">
      계정이 없으신가요? <a href="./signup.html">회원가입</a>
    </p>

  </div>

</div>

<script src="./js/auth.js"></script>
</body>
</html>
